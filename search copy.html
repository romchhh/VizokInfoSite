<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header p {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #999999);
            line-height: 1.4;
        }
        
        .search-form {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .city-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--tg-theme-button-color, #0088cc);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .city-input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
            box-shadow: 0 0 0 3px rgba(0, 136, 204, 0.1);
        }
        
        .city-input::placeholder {
            color: var(--tg-theme-hint-color, #999999);
        }
        
        .arrow-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        
        .arrow {
            background: var(--tg-theme-button-color, #0088cc);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: var(--tg-theme-button-color, #006699);
            transform: translateY(-1px);
        }
        
        .submit-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .example {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid var(--tg-theme-button-color, #0088cc);
        }
        
        .example h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .example p {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666666);
            line-height: 1.4;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--tg-theme-button-color, #0088cc);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffe6e6;
            color: #cc0000;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #ffcccc;
            display: none;
        }
        
        .success {
            background: #e6ffe6;
            color: #008800;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #ccffcc;
            display: none;
        }
        
        .city-input-container {
            position: relative;
        }
        
        .city-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            border: 2px solid var(--tg-theme-button-color, #0088cc);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        
        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
            transition: background-color 0.2s ease;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .suggestion-item:hover,
        .suggestion-item.selected {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
        }
        
        .suggestion-item:last-child {
            border-bottom: none;
        }
        
        .suggestion-city {
            font-weight: 600;
        }
        
        .suggestion-country {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999999);
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--tg-theme-hint-color, #999999);
            z-index: 1;
        }
        
        .city-input.with-icon {
            padding-left: 50px;
        }
        
        .swap-btn {
            background: transparent;
            border: 2px solid var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-color, #0088cc);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .swap-btn:hover {
            background: var(--tg-theme-button-color, #0088cc);
            color: white;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Пошук поїздки</h1>
            <p>Оберіть початкову та кінцеву точки вашої поїздки</p>
        </div>

        <form class="search-form" id="searchForm">
            <div class="form-group">
                <label for="startCity">
                    📍 Звідки
                </label>
                <div class="city-input-container">
                    <div class="input-group">
                        <span class="input-icon">🚩</span>
                        <input type="text" 
                               id="startCity" 
                               name="startCity" 
                               class="city-input with-icon" 
                               placeholder="Введіть місто відправлення" 
                               required autocomplete="off">
                    </div>
                    <div id="startCitySuggestions" class="city-suggestions"></div>
                </div>
            </div>

            <div class="arrow-container">
                <button type="button" class="swap-btn" onclick="swapCities()" title="Поміняти місцями">
                    ⇅
                </button>
            </div>

            <div class="form-group">
                <label for="endCity">
                    🎯 Куди
                </label>
                <div class="city-input-container">
                    <div class="input-group">
                        <span class="input-icon">🏁</span>
                        <input type="text" 
                               id="endCity" 
                               name="endCity" 
                               class="city-input with-icon" 
                               placeholder="Введіть місто призначення" 
                               required autocomplete="off">
                    </div>
                    <div id="endCitySuggestions" class="city-suggestions"></div>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                🔍 Почати пошук
            </button>
        </form>

        <div class="example">
            <h3>💡 Приклади маршрутів:</h3>
            <p>• Київ → Варшава<br>
               • Львів → Краків<br>
               • Одеса → Бухарест<br>
               • Харків → Братислава</p>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Обробляємо ваш запит...</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
    </div>

        // Функція для приховування повідомлень

        // Функція для пошуку міст через різні API
        async function searchCities(query) {
            if (query.length < 2) return [];
            
            // Спочатку пробуємо популярні міста
            const popularCities = getPopularCities(query);
            if (popularCities.length > 0) {
                return popularCities;
            }
            
            try {
                // Пробуємо OpenStreetMap Nominatim API
                const nominatimUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=8&addressdetails=1&accept-language=${userLang}`;
                const response = await fetch(nominatimUrl, {
                    headers: {
                        'User-Agent': 'VizokBot/1.0'
                    }
                });
                const data = await response.json();
                
                if (data && data.length > 0) {
                    return data
                        .filter(item => item.type === 'city' || item.type === 'town' || item.type === 'village' || item.class === 'place')
                        .map(city => ({
                            name: city.display_name.split(',')[0],
                            country: city.address?.country || city.display_name.split(',').pop().trim(),
                            fullName: city.display_name
                        }))
                        .slice(0, 8);
                }
                return [];
            } catch (error) {
                console.error('Помилка пошуку міст:', error);
                return getPopularCities(query); // Fallback до популярних міст
            }
        }

        // Функція для показу підказок
        function showSuggestions(suggestions, container, input) {
            container.innerHTML = '';
            currentSuggestions = suggestions;
            selectedSuggestionIndex = -1;
            activeSuggestionsContainer = container;
            
            if (suggestions.length === 0) {
                container.style.display = 'none';
                return;
            }
            
            suggestions.forEach((suggestion, index) => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `
                    <div class="suggestion-city">${suggestion.name}</div>
                    <div class="suggestion-country">${suggestion.country}</div>
                `;
                
                div.addEventListener('click', () => {
                    input.value = suggestion.name;
                    container.style.display = 'none';
                    input.focus();
                });
                
                container.appendChild(div);
            });
            
            container.style.display = 'block';
        }
        
        // Функція для приховування підказок
        function hideSuggestions() {
            startCitySuggestions.style.display = 'none';
            endCitySuggestions.style.display = 'none';
            activeSuggestionsContainer = null;
        }
        
        // Функція для навігації по підказках клавіатурою
        function navigateSuggestions(direction) {
            if (!activeSuggestionsContainer || currentSuggestions.length === 0) return;
            
            const items = activeSuggestionsContainer.querySelectorAll('.suggestion-item');
            
            // Прибираємо попередній вибір
            if (selectedSuggestionIndex >= 0) {
                items[selectedSuggestionIndex].classList.remove('selected');
            }
            
            // Рахуємо новий індекс
            if (direction === 'down') {
                selectedSuggestionIndex = (selectedSuggestionIndex + 1) % items.length;
            } else if (direction === 'up') {
                selectedSuggestionIndex = selectedSuggestionIndex <= 0 ? items.length - 1 : selectedSuggestionIndex - 1;
            }
            
            // Додаємо новий вибір
            items[selectedSuggestionIndex].classList.add('selected');
        }
        
        // Функція для вибору поточної підказки
        function selectCurrentSuggestion(input) {
            if (selectedSuggestionIndex >= 0 && currentSuggestions[selectedSuggestionIndex]) {
                input.value = currentSuggestions[selectedSuggestionIndex].name;
                hideSuggestions();
                return true;
            }
            return false;
        }

        // Функція обміну міст місцями
        function swapCities() {
            const startValue = startCityInput.value;
            const endValue = endCityInput.value;
            
            startCityInput.value = endValue;
            endCityInput.value = startValue;
            
            // Анімація
            const swapBtn = document.querySelector('.swap-btn');
            swapBtn.style.transform = 'rotate(180deg)';
            setTimeout(() => {
                swapBtn.style.transform = 'rotate(0deg)';
            }, 300);
        }

        // Валідація міст
        function validateCities(startCity, endCity) {
            if (!startCity.trim() || !endCity.trim()) {
                throw new Error(t('error_fill_both'));
            }
            
            if (startCity.trim().toLowerCase() === endCity.trim().toLowerCase()) {
                throw new Error(t('error_same_cities'));
            }
            
            if (startCity.length < 2 || endCity.length < 2) {
                throw new Error(t('error_too_short'));
            }
            
            if (startCity.length > 50 || endCity.length > 50) {
                throw new Error(t('error_too_long'));
            }
        }

                let errorMessage = t('error_prefix') + error.message;
                
                // Додаткова інформація для діагностики
                if (error.message.includes('Failed to fetch')) {

        // Обробник форми
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            submitForm();
        });

        // Автоматичне приховування повідомлень при введенні
        [startCityInput, endCityInput].forEach(input => {
            input.addEventListener('input', hideMessages);
        });

        // Обробка клавіш та автозаповнення для початкового міста
        startCityInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                hideSuggestions();
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                const suggestions = await searchCities(query);
                showSuggestions(suggestions, startCitySuggestions, startCityInput);
            }, 300);
        });

        // Обробка клавіш та автозаповнення для кінцевого міста
        endCityInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                hideSuggestions();
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                const suggestions = await searchCities(query);
                showSuggestions(suggestions, endCitySuggestions, endCityInput);
            }, 300);
        });

        // Обробка клавіш для навігації та вибору
        [startCityInput, endCityInput].forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    navigateSuggestions('down');
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    navigateSuggestions('up');
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (!selectCurrentSuggestion(input)) {
                        submitForm();
                    }
                } else if (e.key === 'Escape') {
                    hideSuggestions();
                }
            });
            
            input.addEventListener('blur', () => {
                // Затримка для обробки кліку по підказці
                setTimeout(hideSuggestions, 150);
            });
        });

        // Приховування підказок при кліку поза ними
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.city-input-container')) {
                hideSuggestions();
            }
        });
